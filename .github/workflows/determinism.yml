name: determinism

on:
  push:
  workflow_dispatch:

env:
  LLAMA_TAG: b3821
  MODEL_URL: https://huggingface.co/bartowski/SmolLM2-135M-Instruct-GGUF/resolve/main/SmolLM2-135M-Instruct-f16.gguf
  MODEL_SHA256: f535f83ec568d040f88ddc04a199fa6da90923bbb41d4dcaed02caa924d6ef57

jobs:
  quantize:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        mode: [default, strict]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Clone llama.cpp (pinned)
        run: git clone --depth 1 --branch "$LLAMA_TAG" https://github.com/ggml-org/llama.cpp

      - name: Build llama-quantize
        shell: bash
        run: |
          set -euo pipefail
          cd llama.cpp
          EXTRA=()
          if [ "${{ runner.os }}" = "macOS" ]; then
            EXTRA+=("-DGGML_METAL=OFF")
          fi
          if [ "${{ matrix.mode }}" = "strict" ]; then
            if [ "${{ runner.os }}" = "Linux" ]; then
              # gcc: disable FP contraction (FMA) + defensively disable autovectorization
              STRICT_FLAGS="-O3 -ffp-contract=off -fno-tree-vectorize -fno-tree-slp-vectorize"
            else
              # clang: disable FP contraction (FMA) + defensively disable autovectorization
              STRICT_FLAGS="-O3 -ffp-contract=off -fno-vectorize -fno-slp-vectorize"
            fi
            cmake -B build -DCMAKE_BUILD_TYPE=Release "${EXTRA[@]}" \
              -DCMAKE_C_FLAGS="$STRICT_FLAGS" -DCMAKE_CXX_FLAGS="$STRICT_FLAGS"
          else
            cmake -B build -DCMAKE_BUILD_TYPE=Release "${EXTRA[@]}"
          fi
          cmake --build build --config Release --target llama-quantize -j 4
          ./build/bin/llama-quantize --help >/dev/null 2>&1 || true

      - name: Download F16 model and verify sha256
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p work
          curl -sL --retry 3 --retry-delay 5 -o work/model-f16.gguf "$MODEL_URL"
          if command -v sha256sum >/dev/null 2>&1; then SHA="sha256sum"; else SHA="shasum -a 256"; fi
          echo "$MODEL_SHA256  work/model-f16.gguf" | $SHA -c -

      - name: Quantize (Q4_K_M, Q6_K, Q8_0, no imatrix)
        shell: bash
        run: |
          set -euo pipefail
          cd work
          for q in Q4_K_M Q6_K Q8_0; do
            ../llama.cpp/build/bin/llama-quantize model-f16.gguf "out-${q}.gguf" "$q"
          done

      - name: Emit hashes
        shell: bash
        run: |
          set -euo pipefail
          if command -v sha256sum >/dev/null 2>&1; then SHA="sha256sum"; else SHA="shasum -a 256"; fi
          cd work
          out="../hashes-${{ matrix.os }}-${{ matrix.mode }}.txt"
          : > "$out"
          for q in Q4_K_M Q6_K Q8_0; do
            h=$($SHA "out-${q}.gguf" | awk '{print $1}')
            s=$(wc -c < "out-${q}.gguf" | tr -d ' ')
            echo "$q $h $s" >> "$out"
          done
          cat "$out"

      - name: Upload hashes artifact
        uses: actions/upload-artifact@v4
        with:
          name: hashes-${{ matrix.os }}-${{ matrix.mode }}
          path: hashes-*.txt
          if-no-files-found: error

  verdict:
    needs: quantize
    runs-on: ubuntu-latest
    steps:
      - name: Download all hash artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hashes-*
          merge-multiple: true

      - name: 4-way comparison and core-claim assertion
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import sys

          combos = [("ubuntu-latest", "default"), ("macos-14", "default"),
                    ("ubuntu-latest", "strict"), ("macos-14", "strict")]
          quants = ["Q4_K_M", "Q6_K", "Q8_0"]

          data = {}   # (os, mode) -> {quant: (sha, size)}
          for os_, mode in combos:
              d = {}
              with open(f"hashes-{os_}-{mode}.txt") as f:
                  for line in f:
                      q, h, s = line.split()
                      d[q] = (h, s)
              data[(os_, mode)] = d

          hdr = ["quant"] + [f"{o.split('-')[0]}-{m}" for o, m in combos]
          print("\n==================== 4-WAY HASH TABLE (sha256 / bytes) ====================")
          print("  ".join(f"{h:<24}" for h in hdr))
          for q in quants:
              row = [q]
              for c in combos:
                  h, s = data[c][q]
                  row.append(f"{h[:16]} {s}")
              print("  ".join(f"{v:<24}" for v in row))

          print("\nFull hashes:")
          for c in combos:
              for q in quants:
                  h, s = data[c][q]
                  print(f"  {c[0]:<14} {c[1]:<8} {q:<7} {h} {s}")

          print("\n==================== DEFAULT-MODE CONTRAST (informational) ====================")
          for q in quants:
              u = data[("ubuntu-latest", "default")][q]
              m = data[("macos-14", "default")][q]
              status = "MATCH" if u == m else "DIFFER"
              expect = "expected MATCH" if q == "Q8_0" else "expected DIFFER"
              print(f"  default ubuntu vs macos {q:<7}: {status} ({expect})")

          print("\n==================== CORE CLAIM: strict ubuntu == strict macos ====================")
          failures = []
          for q in quants:
              u = data[("ubuntu-latest", "strict")][q]
              m = data[("macos-14", "strict")][q]
              status = "MATCH" if u == m else "DIFFER"
              print(f"  strict  ubuntu vs macos {q:<7}: {status}")
              if u != m:
                  failures.append(q)

          if failures:
              print(f"\nCORE CLAIM REFUTED: strict-mode cross-arch mismatch for: {', '.join(failures)}")
              sys.exit(1)
          print("\nCORE CLAIM CONFIRMED: strict builds are bit-identical across x86_64/gcc and arm64/clang.")
          EOF
